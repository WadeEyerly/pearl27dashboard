<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pearl 27 - Global Impact Dashboard v4.9</title>
  <script src="https://unpkg.com/globe.gl"></script>
  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; cursor: pointer; }
    #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
    #logo { position: absolute; top: 15px; left: 15px; pointer-events: auto; }
    #logo img { height: 50px; width: auto; }
    #scoreboard {
      position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
      text-align: center; background: rgba(0, 15, 30, 0.9);
      padding: 8px 30px; border-radius: 40px; border: 1.5px solid #00ccff;
      box-shadow: 0 0 15px rgba(0, 204, 255, 0.4); pointer-events: auto;
    }
    #score-label { font-size: 8px; text-transform: uppercase; letter-spacing: 1.5px; color: #00ccff; margin: 0; }
    #score-count { font-size: 24px; font-weight: 800; color: #ffffff; margin: 0; line-height: 1; }
    #week-indicator { font-size: 11px; color: #fabe11; font-weight: bold; margin-top: 2px; }
    #legend {
      position: absolute; bottom: 15px; right: 15px; pointer-events: auto;
      background: rgba(0, 15, 30, 0.9); padding: 10px; border-radius: 8px;
      border: 1px solid #00ccff; width: 230px; max-height: 35vh; overflow-y: auto;
    }
    .legend-header { display: flex; font-weight: bold; color: #00ccff; font-size: 8px; text-transform: uppercase; border-bottom: 1px solid #00ccff33; padding-bottom: 4px; margin-bottom: 6px; }
    .item { display: flex; align-items: center; margin-bottom: 3px; font-size: 9px; }
    .col-name { flex: 2; }
    .col-drum { flex: 1; text-align: center; font-weight: bold; }
    .col-act { flex: 1; text-align: right; color: #00ccff; font-weight: bold; font-family: monospace; font-size: 11px; }
    .dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    #platform-key { position: absolute; bottom: 15px; left: 15px; background: rgba(0, 15, 30, 0.8); padding: 8px; border-radius: 6px; border: 1px solid #00ccff33; font-size: 9px; pointer-events: auto; }
    .key-item { margin-bottom: 2px; display: flex; align-items: center; }
  </style>
</head>
<body>
  <div id="ui-layer">
    <div id="logo"><img src="pearl27-logo.png"></div>
    <div id="scoreboard">
      <p id="score-label">Total Jobs Created</p>
      <p id="score-count">--</p>
      <div id="week-indicator">Waiting for Engine...</div>
    </div>
    <div id="platform-key">
      <div style="margin-bottom:4px; font-weight:bold; color:#00ccff; text-transform: uppercase; font-size: 8px;">Platform Impact</div>
      <div class="key-item"><span class="dot" style="background:#ff4500"></span> Reddit</div>
      <div class="key-item"><span class="dot" style="background:#00ccff"></span> LinkedIn</div>
      <div class="key-item"><span class="dot" style="background:#ffffff"></span> Facebook</div>
      <div class="key-item"><span class="dot" style="background:#990000"></span> Quora</div>
    </div>
    <div id="legend">
      <div class="legend-header"><span style="flex:2">Location</span><span style="flex:1;text-align:center">Drums</span><span style="flex:1;text-align:right">Activity</span></div>
      <div id="legend-list"></div>
    </div>
  </div>
  <div id="globeViz"></div>

  <script>
    // --- SAFE DATASETS ---
    const TIMELINE = [
      { label: "Feb Week 1", activity: 68, r: 20, li: 19, fb: 29, q: 0 },
      { label: "Feb Week 2", activity: 1779, r: 613, li: 444, fb: 722, q: 0 },
      { label: "Feb Week 3", activity: 3951, r: 1586, li: 957, fb: 1408, q: 0 },
      { label: "Feb Week 4", activity: 4047, r: 1476, li: 1084, fb: 1487, q: 0 },
      { label: "Mar Week 5", activity: 300, r: 300, li: 0, fb: 0, q: 0 },
      { label: "Mar Week 6", activity: 400, r: 400, li: 0, fb: 0, q: 0 },
      { label: "Mar Week 7", activity: 500, r: 500, li: 0, fb: 0, q: 0 },
      { label: "Mar Week 8", activity: 600, r: 600, li: 0, fb: 0, q: 0 },
      { label: "April - Week 9-12", activity: 3513, r: 570, li: 1355, fb: 1448, q: 140 }
    ];

    const indiaActivity = [172, 306, 543, 249, 258, 210, 315, 420, 315];

    const weeklyHubData = {
      "Uganda": { d: [1, 8, 8, 8, 8, 9, 9, 8, 233], a: [29, 230, 783, 764, 991, 1474, 1303, 1027, 585] },
      "Nigeria": { d: [0, 15, 16, 16, 17, 17, 17, 16, 67], a: [0, 539, 879, 1101, 1352, 1280, 1344, 1289, 625] },
      "Rwanda": { d: [0, 0, 0, 0, 1, 1, 1, 0, 42], a: [0, 0, 0, 0, 55, 249, 33, 0, 1245] },
      "Kenya": { d: [4, 6, 5, 6, 5, 6, 3, 3, 30], a: [39, 242, 408, 382, 384, 309, 182, 232, 203] },
      "Ghana": { d: [0, 9, 11, 10, 13, 8, 8, 8, 20], a: [0, 302, 579, 569, 749, 835, 887, 1352, 299] },
      "DR Congo": { d: [0, 5, 6, 6, 6, 7, 7, 7, 11], a: [0, 264, 579, 557, 617, 952, 1823, 922, 285] },
      "USA": { d: [0, 3, 2, 2, 2, 2, 1, 2, 20], a: [0, 47, 118, 120, 146, 150, 6, 18, 88] },
      "Mexico": { d: [0, 3, 3, 2, 2, 1, 2, 1, 4], a: [0, 61, 218, 206, 117, 68, 30, 19, 72] },
      "Congo": { d: [0,0,0,0,0,0,0,0, 2], a: [0,0,0,0,0,0,0,0, 71] },
      "Tanzania": { d: [0,0,0,0,0,0,0,0, 1], a: [0,0,0,0,0,0,0,0, 31] },
      "Bostwana": { d: [0,0,0,0,0,0,0,0, 1], a: [0,0,0,0,0,0,0,0, 3] },
      "Ecuador": { d: [0,0,0,0,0,1,1,1, 1], a: [0,0,0,0,0,202,386,345, 0] },
      "Haiti": { d: [0,1,1,1,1,1,0,0, 1], a: [0,76,300,214,232,251,0,0, 6] },
      "Tonga": { d: [0,1,1,1,1,1,1,1, 1], a: [0,18,54,45,70,129,114,99, 0] },
      "Zimbabwe": { d: [0,0,1,1,1,1,1,1, 1], a: [0,0,33,89,116,118,193,200, 0] }
    };

    const teamData = [
      { id: "Philippines", name: "Philippines / Lifewood", lat: 12.87, lng: 121.77, color: '#fabe11', staticDrums: 60 },
      { id: "Nigeria", name: "Nigeria", lat: 9.08, lng: 8.67, color: '#ffffff', staticDrums: 0 },
      { id: "India", name: "India / OnPoint", lat: 20.59, lng: 78.96, color: '#fabe11', staticDrums: 25 },
      { id: "Uganda", name: "Uganda", lat: 1.37, lng: 32.29, color: '#ffffff', staticDrums: 0 },
      { id: "Rwanda", name: "Rwanda", lat: -1.94, lng: 29.87, color: '#ffffff', staticDrums: 0 },
      { id: "Kenya", name: "Kenya", lat: -1.28, lng: 36.81, color: '#ffffff', staticDrums: 0 },
      { id: "Ghana", name: "Ghana", lat: 7.94, lng: -1.02, color: '#ffffff', staticDrums: 0 },
      { id: "DR Congo", name: "DR Congo", lat: -4.03, lng: 21.75, color: '#ffffff', staticDrums: 0 },
      { id: "USA", name: "USA", lat: 39.82, lng: -98.57, color: '#ffffff', staticDrums: 0 },
      { id: "Mexico", name: "Mexico", lat: 23.63, lng: -102.55, color: '#ffffff', staticDrums: 0 },
      { id: "Congo", name: "Congo (Rep)", lat: -0.22, lng: 15.82, color: '#ffffff', staticDrums: 0 },
      { id: "Tanzania", name: "Tanzania", lat: -6.36, lng: 34.88, color: '#ffffff', staticDrums: 0 },
      { id: "Bostwana", name: "Botswana", lat: -22.32, lng: 24.68, color: '#ffffff', staticDrums: 0 },
      { id: "Ecuador", name: "Ecuador", lat: -1.83, lng: -78.18, color: '#ffffff', staticDrums: 0 },
      { id: "Haiti", name: "Haiti", lat: 18.97, lng: -72.28, color: '#ffffff', staticDrums: 0 },
      { id: "Zimbabwe", name: "Zimbabwe", lat: -19.01, lng: 29.15, color: '#ffffff', staticDrums: 0 },
      { id: "Tonga", name: "Tonga / Spero", lat: -21.17, lng: -175.19, color: '#fabe11', staticDrums: 0 }
    ];

    const TARGETS = [{lat:40.7,lng:-74},{lat:51.5,lng:-0.1},{lat:35.6,lng:139.6},{lat:-33.8,lng:151.2},{lat:25.2,lng:55.2}];

    // --- SETUP UI ---
    const list = document.getElementById('legend-list');
    teamData.forEach(d => {
      list.innerHTML += `<div class="item"><div class="col-name"><span class="dot" style="background:${d.color}"></span><span style="color:${d.color}">${d.name}</span></div><div class="col-drum" id="drums-${d.id}">0</div><div class="col-act" id="act-${d.id}">-</div></div>`;
    });

    let currentIdx = 0;
    let timer;

    // --- MAIN UPDATE FUNCTION ---
    function runUpdate(manual = false) {
      if (!window.myWorld) return; // Wait until globe is ready
      if (manual) { clearInterval(timer); timer = setInterval(runUpdate, 9000); }

      const week = TIMELINE[currentIdx];
      
      // Clear data to prevent ghosting
      window.myWorld.arcsData([]);

      // Brief delay to allow the GPU to clear the previous frame
      setTimeout(() => {
        document.getElementById('week-indicator').innerText = week.label;
        let weeklyTotalDrums = 0;
        const arcs = [];
        const rings = [];

        teamData.forEach(hub => {
          // SAFE DATA CHECK: Use OR 0 if the week index is missing for a country
          let hubDrums = hub.id === 'India' ? 25 : (hub.id === 'Philippines' ? 60 : (weeklyHubData[hub.id]?.d[currentIdx] || 0));
          let hubAct = hub.id === 'India' ? (indiaActivity[currentIdx] || 0) : (weeklyHubData[hub.id]?.a[currentIdx] || 0);
          
          weeklyTotalDrums += hubDrums;
          document.getElementById(`drums-${hub.id}`).innerText = hubDrums;
          document.getElementById(`act-${hub.id}`).innerText = hubAct > 0 ? Math.round(hubAct) : '-';

          if (hubDrums > 0) rings.push({ lat: hub.lat, lng: hub.lng, color: hub.color, count: hubDrums });

          const missileCount = Math.min(10, Math.ceil(hubAct / 75));
          for(let i=0; i < missileCount; i++) {
            const t = TARGETS[Math.floor(Math.random() * TARGETS.length)];
            let col = '#ffffff';
            const r = Math.random();
            const rRatio = week.r / week.activity;
            const liRatio = week.li / week.activity;
            const qRatio = (week.q || 0) / week.activity;

            if (hub.id === 'India') col = '#ff4500';
            else if (r < rRatio) col = '#ff4500'; 
            else if (r < rRatio + liRatio) col = '#00ccff';
            else if (r < rRatio + liRatio + qRatio) col = '#990000'; 

            arcs.push({ startLat: hub.lat, startLng: hub.lng, endLat: t.lat, endLng: t.lng, color: col });
          }
        });

        document.getElementById('score-count').innerText = weeklyTotalDrums;
        window.myWorld.ringsData(rings).arcDashOffset(0).arcsData(arcs);

        // Advance to next week
        currentIdx = (currentIdx + 1) % TIMELINE.length;
      }, 100); 
    }

    // --- INITIALIZE GLOBE ENGINE ---
    const world = Globe()(document.getElementById('globeViz'))
      .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
      .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
      .pointsData(teamData).pointColor(d => d.color).pointRadius(0.8).pointAltitude(0)
      .ringsData([]).ringColor(d => d.color).ringMaxRadius(d => Math.sqrt(d.count) * 0.9).ringRepeatPeriod(1200)
      .arcDashLength(0.5).arcDashGap(2).arcDashAnimateTime(8000).arcStroke(0.3).arcColor('color')
      .onGlobeClick(() => runUpdate(true));

    world.controls().autoRotate = true;
    world.cameraPosition({ z: 400 });

    // Store in global window so functions can find it safely
    window.myWorld = world;

    // WAIT FOR BOOTUP: Start after 1 second to ensure everything is loaded
    setTimeout(() => {
      runUpdate();
      timer = setInterval(runUpdate, 9000);
    }, 1000);
  </script>
</body>
</html>
